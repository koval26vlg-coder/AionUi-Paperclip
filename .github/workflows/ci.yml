name: SML CI

on:
  push:
    paths:
      - "tools/sml/**"
      - "tools/*.py"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "tools/sml/**"
      - "tools/*.py"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/sml/requirements.txt
          pip install -r tools/sml/requirements-dev.txt

      - name: SML selfcheck
        run: python -m tools.sml.core selfcheck

      - name: Run tests
        # Тесты, требующие живой Ollama, скипаются автоматически
        # (pytest.mark.skipif в test_embedding_engine.py).
        run: python -m pytest tools/sml/tests -q
